name: Deploy to Production

on:
  workflow_dispatch:
    inputs:
      confirm:
        description: 'Type "deploy" to confirm production deployment'
        required: true
        type: string

jobs:
  deploy:
    runs-on: ubuntu-latest
    if: github.event.inputs.confirm == 'deploy'
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Merge staging into master
        run: |
          git config user.name "GitHub Actions"
          git config user.email "actions@github.com"
          git checkout master
          git merge origin/staging --no-edit
          git push origin master

      - name: Summary
        run: |
          echo "## Production Deploy" >> $GITHUB_STEP_SUMMARY
          echo "Staging merged into master successfully." >> $GITHUB_STEP_SUMMARY
          echo "Railway will auto-deploy production." >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Commits deployed:" >> $GITHUB_STEP_SUMMARY
          git log master --not origin/master~5 --oneline -10 >> $GITHUB_STEP_SUMMARY
